name: Render CI + Deploy Trigger

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - typecheck
          - lint
          - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run quality check
        shell: bash
        run: |
          case "${{ matrix.check }}" in
            typecheck) npx tsc --noEmit ;;
            lint) npm run lint ;;
            test) npm test -- --run ;;
            *) echo "Unknown check: ${{ matrix.check }}"; exit 1 ;;
          esac

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app
        run: npm run build

  deploy:
    name: Trigger Render Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_DEPLOY_RETRIES: '6'
      RENDER_DEPLOY_TIMEOUT_MS: '15000'
      RENDER_DEPLOY_RETRY_INTERVAL_MS: '2000'
      HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
      HEALTHCHECK_TIMEOUT_SEC: '600'
      HEALTHCHECK_INTERVAL_SEC: '10'
      HEALTHCHECK_FETCH_TIMEOUT_MS: '8000'
      HEALTHCHECK_OK_STATUS_MIN: '200'
      HEALTHCHECK_OK_STATUS_MAX: '399'
      NEXT_PUBLIC_BASE_URL: 'https://secretsaju.onrender.com'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trigger Render deploy hook (optional)
        run: node scripts/render-deploy.js

      - name: Wait for service health
        shell: bash
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            export HEALTHCHECK_URL="${NEXT_PUBLIC_BASE_URL}/api/health"
          fi
          node scripts/wait-for-health.js
