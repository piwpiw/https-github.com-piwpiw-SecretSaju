name: Render CI + Deploy Trigger

on:
  workflow_dispatch:
    inputs:
      force:
        description: "강제 운영 배포 실행"
        required: false
        default: "false"
        type: boolean
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks in parallel
        shell: bash
        run: |
          set +e
          npx tsc --noEmit &
          TSC_PID=$!
          npm run lint &
          LINT_PID=$!
          npm test -- --run &
          TEST_PID=$!

          wait $TSC_PID; TSC_EXIT=$?
          wait $LINT_PID; LINT_EXIT=$?
          wait $TEST_PID; TEST_EXIT=$?

          if [ $TSC_EXIT -ne 0 ] || [ $LINT_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            echo "One or more quality checks failed."
            exit 1
          fi

  deploy:
    name: Trigger Render Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Render auto-deploy is expected to handle main branch pushes."
            exit 0
          fi
          status=$(curl -s -o /tmp/render_hook_response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Render deploy trigger failed with status $status"
            cat /tmp/render_hook_response.txt
            exit 1
          fi
          echo "Render deploy hook triggered successfully."
