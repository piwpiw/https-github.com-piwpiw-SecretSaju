name: Render CI + Deploy Trigger

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"
      - "archives/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
    timeout-minutes: 25
    outputs:
      q_failed: ${{ steps.quality-check.outputs.failed }}
    env:
      RUN_TESTS: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tests')) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm config set optional false
          npm config set platform linux
          npm config set arch x64
          npm ci --no-audit --no-fund

      - name: Run quality checks in parallel
        id: quality-check
        shell: bash
        run: |
          set +e
          npx tsc --noEmit > /tmp/tsc.log 2>&1 &
          TSC_PID=$!
          npm run lint > /tmp/lint.log 2>&1 &
          LINT_PID=$!

          if [ "$RUN_TESTS" = "true" ]; then
            npm test -- --run > /tmp/test.log 2>&1 &
            TEST_PID=$!
          else
            : > /tmp/test.log
            echo "skip tests for non-main/pr quality checks. add PR label 'run-tests' to run." >> /tmp/test.log
            TEST_PID=0
          fi

          wait $TSC_PID; TSC_EXIT=$?
          wait $LINT_PID; LINT_EXIT=$?
          if [ "$RUN_TESTS" = "true" ]; then
            wait $TEST_PID; TEST_EXIT=$?
          else
            TEST_EXIT=0
          fi

          if [ $TSC_EXIT -ne 0 ]; then
            echo "--- TypeScript check failed ---"
            cat /tmp/tsc.log
          fi
          if [ $LINT_EXIT -ne 0 ]; then
            echo "--- Lint failed ---"
            cat /tmp/lint.log
          fi
          if [ $TEST_EXIT -ne 0 ]; then
            echo "--- Test failed ---"
            cat /tmp/test.log
          fi

          if [ $TSC_EXIT -ne 0 ] || [ $LINT_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle quality triage
        if: always()
        run: |
          tar -czf /tmp/quality-triage-${{ github.run_id }}-${{ github.run_attempt }}.tgz \
            /tmp/tsc.log \
            /tmp/lint.log \
            /tmp/test.log \
            --ignore-failed-read || true

      - name: Upload quality triage bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-triage-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/quality-triage-${{ github.run_id }}-${{ github.run_attempt }}.tgz
          retention-days: 7

      - name: Publish quality summary
        if: always()
        run: |
          {
            echo "## Quality Gate Summary"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- ref: `${{ github.ref_name }}\`"
            echo "- run-tests: \`${RUN_TESTS}\`"
            echo ""
            echo "### logs"
            echo "- /tmp/tsc.log"
            echo "- /tmp/lint.log"
            echo "- /tmp/test.log"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Trigger Render Deploy
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    env:
      Q_FAIL: ${{ needs.quality.outputs.q_failed || 'false' }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_DEPLOY_RETRIES: '6'
      RENDER_DEPLOY_TIMEOUT_MS: '15000'
      RENDER_DEPLOY_RETRY_INTERVAL_MS: '2000'
      HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
      HEALTHCHECK_TIMEOUT_SEC: '600'
      HEALTHCHECK_INTERVAL_SEC: '10'
      HEALTHCHECK_FETCH_TIMEOUT_MS: '8000'
      HEALTHCHECK_OK_STATUS_MIN: '200'
      HEALTHCHECK_OK_STATUS_MAX: '399'
      NEXT_PUBLIC_BASE_URL: 'https://secretsaju.onrender.com'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enforce deployment policy
        run: |
          echo "DEPLOY_STAGE=policy" >> "$GITHUB_ENV"
          node scripts/deploy-policy.js --platform render --mode production

      - name: Trigger Render deploy hook
        run: |
          echo "DEPLOY_STAGE=hook" >> "$GITHUB_ENV"
          set -o pipefail
          node scripts/render-deploy.js 2>&1 | tee /tmp/render-deploy.log

      - name: Wait for service health
        shell: bash
        run: |
          echo "DEPLOY_STAGE=healthcheck" >> "$GITHUB_ENV"
          if [ -z "$HEALTHCHECK_URL" ]; then
            export HEALTHCHECK_URL="${NEXT_PUBLIC_BASE_URL}/api/health"
          fi
          set -o pipefail
          node scripts/wait-for-health.js 2>&1 | tee /tmp/healthcheck.log

      - name: Publish diagnostics summary
        if: always()
        run: |
          {
            echo "## Render Deploy Diagnostics"
            echo ""
            echo "- workflow: ${{ github.workflow }}"
            echo "- run: [${{ github.run_id }} #${{ github.run_attempt }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- ref: `${{ github.ref_name }}`"
            echo "- commit: `${{ github.sha }}`"
            echo "- status: \`${{ job.status }}\`"
            echo ""
            echo "### Artifacts"
            echo "- deploy-report-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "- deploy-triage-${{ github.run_id }}-${{ github.run_attempt }}"
            echo ""
            echo "### Notes"
            echo "- Health check endpoint: \`${HEALTHCHECK_URL:-${NEXT_PUBLIC_BASE_URL}/api/health}\`"
            echo "- Deploy hook URL configured: $( [ -n \"${RENDER_DEPLOY_HOOK_URL}\" ] && echo true || echo false )"
            echo "- quality step failed: \`${Q_FAIL}\`"
            echo "- last known stage: \`${DEPLOY_STAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish failure hints
        if: failure()
        run: |
          {
            echo "## Failure Hints"
            echo ""
            if [ "${Q_FAIL}" = "true" ]; then
              echo "**Top failure stage:** quality"
            elif [ "${DEPLOY_STAGE}" = "hook" ]; then
              echo "**Top failure stage:** deploy-hook"
            elif [ "${DEPLOY_STAGE}" = "healthcheck" ]; then
              echo "**Top failure stage:** healthcheck"
            else
              echo "**Top failure stage:** deploy"
            fi
            for f in /tmp/render-deploy.log /tmp/healthcheck.log; do
              if [ ! -f "$f" ]; then
                continue
              fi
              echo "### $(basename \"$f\")"
              grep -Ei "error|failed|failure|timed out|timeout|unhandled|fatal|refused|5..|4.." "$f" | tail -n 20 || true
              echo ""
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write compact deploy report
        if: always()
        run: |
          if [ "${Q_FAIL}" = "true" ]; then
            FAILURE_STAGE=quality
          elif [ "${DEPLOY_STAGE}" = "hook" ]; then
            FAILURE_STAGE=deploy-hook
          elif [ "${DEPLOY_STAGE}" = "healthcheck" ]; then
            FAILURE_STAGE=healthcheck
          else
            FAILURE_STAGE=deploy
          fi

          cat > /tmp/deploy-report.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "status": "${{ job.status }}",
            "quality_failed": "${Q_FAIL}",
            "failure_stage": "${FAILURE_STAGE}",
            "healthcheck_url": "${HEALTHCHECK_URL:-${NEXT_PUBLIC_BASE_URL}/api/health}"
          }
          EOF
          cat /tmp/deploy-report.json

      - name: Upload deploy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/deploy-report.json
          retention-days: 7

      - name: Bundle deploy triage artifacts
        if: always()
        run: |
          tar -czf /tmp/deploy-triage-${{ github.run_id }}-${{ github.run_attempt }}.tgz \
            /tmp/render-deploy.log \
            /tmp/healthcheck.log \
            /tmp/deploy-report.json \
            --ignore-failed-read || true

      - name: Upload deploy triage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-triage-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/deploy-triage-${{ github.run_id }}-${{ github.run_attempt }}.tgz
          retention-days: 7
