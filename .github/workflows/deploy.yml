name: Render CI + Deploy Trigger

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
    timeout-minutes: 25
    env:
      RUN_TESTS: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tests')) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional

      - name: Run quality checks in parallel
        shell: bash
        run: |
          set +e
          npx tsc --noEmit > /tmp/tsc.log 2>&1 &
          TSC_PID=$!
          npm run lint > /tmp/lint.log 2>&1 &
          LINT_PID=$!

          if [ "$RUN_TESTS" = "true" ]; then
            npm test -- --run > /tmp/test.log 2>&1 &
            TEST_PID=$!
          else
            : > /tmp/test.log
            echo "skip tests for non-main/pr quality checks. add PR label 'run-tests' to run." >> /tmp/test.log
            TEST_PID=0
          fi

          wait $TSC_PID; TSC_EXIT=$?
          wait $LINT_PID; LINT_EXIT=$?
          if [ "$RUN_TESTS" = "true" ]; then
            wait $TEST_PID; TEST_EXIT=$?
          else
            TEST_EXIT=0
          fi

          if [ $TSC_EXIT -ne 0 ]; then
            echo "--- TypeScript check failed ---"
            cat /tmp/tsc.log
          fi
          if [ $LINT_EXIT -ne 0 ]; then
            echo "--- Lint failed ---"
            cat /tmp/lint.log
          fi
          if [ $TEST_EXIT -ne 0 ]; then
            echo "--- Test failed ---"
            cat /tmp/test.log
          fi

          if [ $TSC_EXIT -ne 0 ] || [ $LINT_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
            exit 1
          fi

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/*.log
          retention-days: 7

      - name: Publish quality summary
        if: always()
        run: |
          {
            echo "## Quality Gate Summary"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- ref: `${{ github.ref_name }}\`"
            echo "- run-tests: \`${RUN_TESTS}\`"
            echo ""
            echo "### logs"
            echo "- /tmp/tsc.log"
            echo "- /tmp/lint.log"
            echo "- /tmp/test.log"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional

      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/build.log
          retention-days: 7

      - name: Publish build summary
        if: always()
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "- status: \`${{ job.status }}\`"
            echo "- node: \`20\`"
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Trigger Render Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_DEPLOY_RETRIES: '6'
      RENDER_DEPLOY_TIMEOUT_MS: '15000'
      RENDER_DEPLOY_RETRY_INTERVAL_MS: '2000'
      HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
      HEALTHCHECK_TIMEOUT_SEC: '600'
      HEALTHCHECK_INTERVAL_SEC: '10'
      HEALTHCHECK_FETCH_TIMEOUT_MS: '8000'
      HEALTHCHECK_OK_STATUS_MIN: '200'
      HEALTHCHECK_OK_STATUS_MAX: '399'
      NEXT_PUBLIC_BASE_URL: 'https://secretsaju.onrender.com'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trigger Render deploy hook (optional)
        run: |
          set -o pipefail
          node scripts/render-deploy.js 2>&1 | tee /tmp/render-deploy.log

      - name: Upload render-deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-deploy-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/render-deploy.log
          retention-days: 7

      - name: Wait for service health
        shell: bash
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            export HEALTHCHECK_URL="${NEXT_PUBLIC_BASE_URL}/api/health"
          fi
          set -o pipefail
          node scripts/wait-for-health.js 2>&1 | tee /tmp/healthcheck.log

      - name: Upload healthcheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/healthcheck.log
          retention-days: 7

      - name: Bundle deploy diagnostics
        if: always()
        run: |
          tar -czf /tmp/deploy-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}.tgz \
            /tmp/build.log \
            /tmp/render-deploy.log \
            /tmp/healthcheck.log \
            --ignore-failed-read || true

      - name: Upload deploy diagnostics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/deploy-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}.tgz
          retention-days: 7

      - name: Publish diagnostics summary
        if: always()
        run: |
          {
            echo "## Render Deploy Diagnostics"
            echo ""
            echo "- workflow: ${{ github.workflow }}"
            echo "- run: [${{ github.run_id }} #${{ github.run_attempt }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- ref: `${{ github.ref_name }}`"
            echo "- commit: `${{ github.sha }}`"
            echo "- status: \`${{ job.status }}\`"
            echo ""
            echo "### Artifacts"
            echo "- build-log-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "- render-deploy-log-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "- healthcheck-log-${{ github.run_id }}-${{ github.run_attempt }}"
            echo ""
            echo "### Notes"
            echo "- Health check endpoint: \`${HEALTHCHECK_URL:-${NEXT_PUBLIC_BASE_URL}/api/health}\`"
            echo "- Deploy hook URL configured: $( [ -n \"${RENDER_DEPLOY_HOOK_URL}\" ] && echo true || echo false )"
          } >> "$GITHUB_STEP_SUMMARY"
