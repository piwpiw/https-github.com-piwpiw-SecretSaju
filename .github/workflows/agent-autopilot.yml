name: AutoPilot CI

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "archives/docs/**"

jobs:
  validate-and-merge:
    if: startsWith(github.head_ref, 'auto/')
    runs-on: ubuntu-latest
    timeout-minutes: 18
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional

      - name: Run Build and QA
        run: |
          set -o pipefail
          npm run qa 2>&1 | tee /tmp/autopilot-qa.log
          
      - name: Upload AutoPilot QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-qa-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/autopilot-qa.log
          retention-days: 7

      - name: Publish AutoPilot summary
        if: always()
        run: |
          {
            echo "## AutoPilot CI Diagnostics"
            echo ""
            echo "- workflow: ${{ github.workflow }}"
            echo "- run: [${{ github.run_id }} #${{ github.run_attempt }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- branch: `${{ github.head_ref }}`"
            echo "- pr: #${{ github.event.pull_request.number }}"
            echo "- status: \`${{ job.status }}\`"
            echo "- node-version: 20"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AutoPilot diagnostics bundle
        if: always()
        run: |
          tar -czf /tmp/autopilot-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}.tgz \
            /tmp/autopilot-qa.log \
            --ignore-failed-read || true

      - name: Upload AutoPilot diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/autopilot-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}.tgz
          retention-days: 7
        
      - name: Automerge
        if: success() && startsWith(github.head_ref, 'auto/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"

      - name: Report Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let hint = '';
            try {
              const log = fs.readFileSync('/tmp/autopilot-qa.log', 'utf8');
              const lines = log
                .split('\n')
                .filter((line) => /(error|failed|failure|timeout|unhandled|fatal)/i.test(line))
                .slice(-20)
                .join('\n');
              hint = lines || 'No clear pattern found in logs.';
            } catch (error) {
              hint = `Could not read /tmp/autopilot-qa.log: ${error.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "AutoPilot CI failed during `npm run qa`. Please inspect the Actions tab.",
                "",
                "Possible failure hints:",
                "```",
                hint,
                "```",
                "",
                `Run log: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            })
