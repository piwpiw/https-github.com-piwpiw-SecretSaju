<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minimalist Saju Home - Variant 2</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#20df40",
                        "primary-dark": "#18a830",
                        "secondary": "#50955c",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112114",
                        "sage-50": "#f4f7f5",
                        "sage-100": "#e3ebe5",
                        "sage-200": "#c5d8c9",
                        "sage-500": "#6b9c76",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans KR", "sans-serif"],
                        "body": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", 
                        "lg": "1rem", 
                        "xl": "1.5rem", 
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #e3ebe5 1px, transparent 1px), linear-gradient(to bottom, #e3ebe5 1px, transparent 1px)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for claymorphism effects and details */
        .clay-card {
            background: #ffffff;
            box-shadow: 
                8px 8px 16px #d1d9d4, 
                -8px -8px 16px #ffffff;
            border-radius: 1.5rem;
        }
        
        .clay-icon-container {
            background: #f8faf9;
            box-shadow: 
                inset 6px 6px 10px #e6ece9, 
                inset -6px -6px 10px #ffffff;
        }

        .dark .clay-card {
            background: #1a2e1e;
            box-shadow: 
                8px 8px 16px #0d170f, 
                -8px -8px 16px #27452d;
        }
        
        .dark .clay-icon-container {
            background: #1a2e1e;
            box-shadow: 
                inset 4px 4px 8px #0d170f, 
                inset -4px -4px 8px #27452d;
        }

        /* Subtle grid background for the main card */
        .grid-bg {
            background-size: 24px 24px;
            background-image: linear-gradient(to right, rgba(80, 149, 92, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(80, 149, 92, 0.05) 1px, transparent 1px);
        }

        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden shadow-2xl bg-[#fafcfb] dark:bg-[#112114]">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-[#fafcfb]/90 dark:bg-[#112114]/90 backdrop-blur-md">
<div class="flex flex-col">
<span class="text-xs font-medium text-sage-500 dark:text-sage-200 mb-1">9월 24일 화요일</span>
<h2 class="text-xl font-bold text-gray-900 dark:text-white leading-tight">안녕하세요, 민지님</h2>
</div>
<button class="relative p-2 rounded-full hover:bg-sage-100 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-800 dark:text-gray-200">notifications</span>
<span class="absolute top-2 right-2.5 h-2 w-2 rounded-full bg-red-500 border border-white dark:border-[#112114]"></span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-5 pb-24 space-y-8">
<!-- Daily Fortune Card -->
<section class="mt-4">
<div class="relative w-full overflow-hidden rounded-2xl bg-white dark:bg-[#1a2e1e] shadow-[0_10px_30px_-10px_rgba(80,149,92,0.15)] border border-sage-100 dark:border-white/5">
<!-- Faint Grid Texture -->
<div class="absolute inset-0 grid-bg opacity-100 pointer-events-none"></div>
<div class="relative p-6 z-10">
<div class="flex justify-between items-start mb-4">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary-dark dark:text-primary">
                                오늘의 흐름
                            </span>
<span class="material-symbols-outlined text-sage-500" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-3 leading-snug">
                            강한 바람이 <br/>새로운 기회를 가져옵니다.
                        </h3>
<p class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed mb-6">
                            변화를 두려워하지 마세요. 오늘 당신에게 다가오는 제안은 긍정적인 신호일 가능성이 높습니다.
                        </p>
<div class="flex items-center gap-4 pt-4 border-t border-sage-100 dark:border-white/10">
<div class="flex flex-col">
<span class="text-xs text-sage-500 dark:text-gray-400">행운 지수</span>
<span class="text-lg font-bold text-primary-dark dark:text-primary">92%</span>
</div>
<div class="h-8 w-[1px] bg-sage-100 dark:bg-white/10"></div>
<div class="flex flex-col">
<span class="text-xs text-sage-500 dark:text-gray-400">행운의 색</span>
<div class="flex items-center gap-1">
<div class="w-3 h-3 rounded-full bg-emerald-500"></div>
<span class="text-sm font-medium text-gray-800 dark:text-gray-200">에메랄드</span>
</div>
</div>
<div class="h-8 w-[1px] bg-sage-100 dark:bg-white/10"></div>
<div class="flex flex-col">
<span class="text-xs text-sage-500 dark:text-gray-400">방향</span>
<span class="text-sm font-medium text-gray-800 dark:text-gray-200">동쪽</span>
</div>
</div>
</div>
</div>
</section>
<!-- Categories Grid (Simulated 3D Claymorphism) -->
<section>
<div class="flex items-center justify-between mb-4 px-1">
<h2 class="text-lg font-bold text-gray-900 dark:text-white">나의 운세 분석</h2>
<a class="text-xs font-medium text-sage-500 hover:text-primary transition-colors" href="#">전체보기</a>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Love Luck -->
<button class="clay-card p-5 flex flex-col items-center justify-center gap-3 hover:-translate-y-1 transition-transform duration-300 group">
<div class="clay-icon-container w-14 h-14 rounded-2xl flex items-center justify-center text-pink-500 group-hover:text-pink-600 transition-colors relative overflow-hidden">
<!-- Pseudo 3D effect with gradient/shadow -->
<div class="absolute inset-0 bg-gradient-to-br from-pink-500/10 to-transparent"></div>
<span class="material-symbols-outlined text-[32px] drop-shadow-sm z-10" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="text-sm font-bold text-gray-800 dark:text-gray-200">연애운</span>
<span class="text-[10px] text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full dark:bg-pink-900/30">설렘 주의</span>
</button>
<!-- Wealth Luck -->
<button class="clay-card p-5 flex flex-col items-center justify-center gap-3 hover:-translate-y-1 transition-transform duration-300 group">
<div class="clay-icon-container w-14 h-14 rounded-2xl flex items-center justify-center text-yellow-600 group-hover:text-yellow-700 transition-colors relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-yellow-500/10 to-transparent"></div>
<span class="material-symbols-outlined text-[32px] drop-shadow-sm z-10" style="font-variation-settings: 'FILL' 1;">paid</span>
</div>
<span class="text-sm font-bold text-gray-800 dark:text-gray-200">재물운</span>
<span class="text-[10px] text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded-full dark:bg-yellow-900/30">지출 관리</span>
</button>
<!-- Career Luck -->
<button class="clay-card p-5 flex flex-col items-center justify-center gap-3 hover:-translate-y-1 transition-transform duration-300 group">
<div class="clay-icon-container w-14 h-14 rounded-2xl flex items-center justify-center text-blue-500 group-hover:text-blue-600 transition-colors relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent"></div>
<span class="material-symbols-outlined text-[32px] drop-shadow-sm z-10" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<span class="text-sm font-bold text-gray-800 dark:text-gray-200">직업운</span>
<span class="text-[10px] text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full dark:bg-blue-900/30">승진 기회</span>
</button>
<!-- Health Luck -->
<button class="clay-card p-5 flex flex-col items-center justify-center gap-3 hover:-translate-y-1 transition-transform duration-300 group">
<div class="clay-icon-container w-14 h-14 rounded-2xl flex items-center justify-center text-emerald-500 group-hover:text-emerald-600 transition-colors relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-transparent"></div>
<span class="material-symbols-outlined text-[32px] drop-shadow-sm z-10" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<span class="text-sm font-bold text-gray-800 dark:text-gray-200">건강운</span>
<span class="text-[10px] text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full dark:bg-emerald-900/30">컨디션 굿</span>
</button>
</div>
</section>
<!-- Premium CTA -->
<section class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-[#112114] to-[#1a2e1e] p-6 text-center shadow-lg dark:border dark:border-white/10">
<!-- Abstract glowing orb -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl"></div>
<h3 class="relative z-10 text-xl font-bold text-white mb-2">당신의 운명을 더 깊이 알아보세요</h3>
<p class="relative z-10 text-white/70 text-sm mb-6 max-w-xs mx-auto">전체 사주 풀이와 월별 상세 운세로 미래를 준비하세요.</p>
<button class="relative z-10 w-full bg-gradient-to-r from-primary to-[#4ade80] hover:from-[#18a830] hover:to-primary text-[#0e1b10] font-bold py-3.5 px-6 rounded-xl shadow-[0_4px_14px_0_rgba(32,223,64,0.39)] transition-all transform active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">lock_open</span>
                    프리미엄 시작하기
                </button>
</section>
<div class="h-8"></div>
</main>
<!-- Floating Bottom Navigation -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 dark:bg-[#1a2e1e]/90 backdrop-blur-lg border border-white/20 dark:border-white/5 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] px-6 py-3 flex items-center gap-8 z-50">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary text-[28px] transition-transform group-hover:-translate-y-0.5" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-sage-200 dark:text-gray-500 text-[28px] transition-colors hover:text-primary dark:hover:text-primary transition-transform group-hover:-translate-y-0.5">history_edu</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-sage-200 dark:text-gray-500 text-[28px] transition-colors hover:text-primary dark:hover:text-primary transition-transform group-hover:-translate-y-0.5">person</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-sage-200 dark:text-gray-500 text-[28px] transition-colors hover:text-primary dark:hover:text-primary transition-transform group-hover:-translate-y-0.5">settings</span>
</button>
</nav>
</div>
</body></html>
